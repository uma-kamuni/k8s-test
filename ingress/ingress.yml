apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /home
        pathType: Prefix
        backend:
          service:
            name: home-svc
            port:
              number: 80
      - path: /mobile
        pathType: Prefix
        backend:
          service:
            name: mobile-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: laptop-svc
            port:
              number: 8080